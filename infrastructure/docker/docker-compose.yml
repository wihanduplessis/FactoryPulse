services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: factorypulse-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ../../backend
      dockerfile: docker/Dockerfile.api
    container_name: factorypulse-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      UseHttpsRedirection: "false"
      ApplyMigrationsOnStartup: "true"
      SeedIdentityOnStartup: "true"
      ConnectionStrings__FactoryPulseDatabase: "Server=sqlserver,1433;Database=FactoryPulseDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
      JwtSettings__Key: "${JWT_KEY}"
      SeedAdmin__Password: "${SEED_ADMIN_PASSWORD}"
      SeedAdmin__Email: "${SEED_ADMIN_EMAIL}"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  sql_data: