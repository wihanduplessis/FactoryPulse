name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v7          

      - name: Set up .NET
        uses: actions/setup-dotnet@v5      
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v6             
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/Directory.Packages.props', 'backend/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore backend/FactoryPulse.slnx

      - name: Build
        run: dotnet build backend/FactoryPulse.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/FactoryPulse.slnx --configuration Release --no-build

  docker:
    name: Build container image
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build the API image
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/docker/Dockerfile.api
          push: false
          tags: factorypulse-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max