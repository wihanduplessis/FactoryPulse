name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v7          

      - name: Set up .NET
        uses: actions/setup-dotnet@v5      
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v6             
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/Directory.Packages.props', 'backend/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore backend/FactoryPulse.slnx

      - name: Build
        run: dotnet build backend/FactoryPulse.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/FactoryPulse.slnx --configuration Release --no-build
        
      - name: Install the EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Generate the idempotent migration script
        env:
          JwtSettings__Key: design-time-placeholder-key-not-a-real-secret
          ConnectionStrings__FactoryPulseDatabase: "Server=localhost;Database=design-time;Trusted_Connection=True;"
        run: |
          dotnet ef migrations script --idempotent \
            --project backend/src/FactoryPulse.Infrastructure \
            --startup-project backend/src/FactoryPulse.API \
            --output migrations.sql

      - name: Upload the migration script
        uses: actions/upload-artifact@v4
        with:
          name: migrations
          path: migrations.sql

  migrate:
    name: Apply database migrations
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download the migration script
        uses: actions/download-artifact@v4
        with:
          name: migrations

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Write a wake-up query
        run: echo "SELECT 1;" > wake.sql

      - name: Trigger the resume
        continue-on-error: true
        uses: azure/sql-action@v2
        with:
          connection-string: 'Server=tcp:${{ vars.AZURE_SQL_SERVER }},1433;Database=${{ vars.AZURE_SQL_DATABASE }};Authentication=Active Directory Default;Encrypt=True;'
          path: ./wake.sql

      - name: Wait for the database to come online
        run: |
          for attempt in {1..10}; do
            status=$(az sql db show \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --server ${{ vars.AZURE_SQL_SERVER_NAME }} \
              --name ${{ vars.AZURE_SQL_DATABASE }} \
              --query status -o tsv)
            echo "Attempt $attempt: database is $status"
            if [ "$status" = "Online" ]; then exit 0; fi
            sleep 15
          done
          echo "Database did not come online in time." && exit 1

      - name: Apply the migrations to Azure SQL
        uses: azure/sql-action@v2
        with:
          connection-string: 'Server=tcp:${{ vars.AZURE_SQL_SERVER }},1433;Database=${{ vars.AZURE_SQL_DATABASE }};Authentication=Active Directory Default;Encrypt=True;'
          path: ./migrations.sql

  docker:
    name: Build container image
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check out the code
        uses: actions/checkout@v7

      - name: Log in to Azure
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to the container registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: az acr login --name ${{ vars.AZURE_CONTAINER_REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build the API image, and push it from main
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/docker/Dockerfile.api
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io/factorypulse-api:${{ github.sha }}
            ${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io/factorypulse-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max