name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v7          

      - name: Set up .NET
        uses: actions/setup-dotnet@v5      
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v6             
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/Directory.Packages.props', 'backend/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore backend/FactoryPulse.slnx

      - name: Build
        run: dotnet build backend/FactoryPulse.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/FactoryPulse.slnx --configuration Release --no-build

  docker:
    name: Build container image
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check out the code
        uses: actions/checkout@v7

      - name: Log in to Azure
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to the container registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: az acr login --name ${{ vars.AZURE_CONTAINER_REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build the API image, and push it from main
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/docker/Dockerfile.api
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io/factorypulse-api:${{ github.sha }}
            ${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io/factorypulse-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max